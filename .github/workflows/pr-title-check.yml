name: PR Title Check

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            chore
            ci
          requireScope: false

      - name: Check issue reference in title
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title
            if (!/ #\d+$/.test(title)) {
              core.setFailed(
                'PR title must end with the issue number.\n' +
                'Correct:   feat(auth): add user profile #42\n' +
                'Incorrect: feat(auth): add user profile'
              )
            }
